<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingresar | El Oráculo de Neville</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0d0d12;
            color: #ffffff;
            margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(235, 209, 151, 0.1) 0%, rgba(13, 13, 18, 0) 70%);
            z-index: -1;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .auth-container h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #ebd197;
            margin-bottom: 10px;
        }

        .auth-container p {
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            gap: 10px;
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-social img {
            width: 24px;
            height: 24px;
        }

        .btn-google { border-color: rgba(66, 133, 244, 0.5); }
        .btn-apple { border-color: rgba(255, 255, 255, 0.3); }

        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="auth-container">
        <h2>Ingresar</h2>
        <p>Tu viaje hacia el despertar comienza aquí.</p>
        
        <button class="btn-social btn-google" id="btn-google">
            <!-- Icono genérico SVG de Google -->
            <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Continuar con Google
        </button>

        <button class="btn-social btn-apple" id="btn-apple">
            <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.05 2.53.8 3.25.8.72 0 2.14-.9 3.76-.78 1.59.12 3.04.83 3.92 2.1-3.32 1.94-2.81 6.55.54 7.9-1.02 2.6-2.58 4.97-3.47 5.95M12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.26 2.4-1.95 4.38-3.74 4.25" fill="white"/></svg>
            Continuar con Apple
        </button>

        <a href="landing.html" class="back-link">← Volver al inicio</a>
    </div>

    <script>
        // Inicialización de Supabase con las keys de entorno
        // Reemplazar estas variables con las reales (usualmente inyectadas por un build o el backend)
        const SUPABASE_URL = 'https://iwgqkxjdnpfpkxrnzvfs.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY'; // Lo agregaremos luego dinámicamente

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.getElementById('btn-google').addEventListener('click', async () => {
            alert('¡Próximamente conectaremos Google Auth con tu anon_key de Supabase!');
        });

        document.getElementById('btn-apple').addEventListener('click', async () => {
            alert('¡Próximamente conectaremos Apple Auth con tu anon_key de Supabase!');
        });
    </script>
</body>
</html>
